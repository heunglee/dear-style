name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared-contracts:
    name: Shared API Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate shared API catalog
        run: |
          python -m json.tool shared/api/type_catalog.json > /tmp/type_catalog.json
          python - <<'PY'
          import json
          from pathlib import Path

          catalog = json.loads(Path("shared/api/type_catalog.json").read_text())
          required_target_areas = {"lip_line", "eyebrow", "blush", "full_feedback"}
          actual_target_areas = set(catalog["enums"]["CoachingTargetArea"])
          missing = required_target_areas - actual_target_areas
          if missing:
              raise SystemExit(f"Missing coaching target areas: {sorted(missing)}")
          PY

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint backend
        working-directory: backend
        run: ruff check .

      - name: Test backend
        working-directory: backend
        run: pytest

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Lint web
        working-directory: web
        run: npm run lint

      - name: Typecheck web
        working-directory: web
        run: npm run typecheck

      - name: Build web
        working-directory: web
        run: npm run build

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Build Android debug app
        working-directory: android
        run: gradle :app:assembleDebug

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build iOS simulator app
        working-directory: ios
        run: |
          xcodebuild \
            -project DearStyle.xcodeproj \
            -scheme DearStyle \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO
