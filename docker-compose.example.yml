version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dearstyle
      POSTGRES_PASSWORD: dearstyle
      POSTGRES_DB: dearstyle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://dearstyle:dearstyle@postgres:5432/dearstyle
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: local
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
